name: Update lab photo gallery

on:
  push:
    paths:
      - "lab_pics/**"
      - ".github/workflows/update-gallery.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-gallery:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate gallery manifest
        run: |
          mkdir -p lab_pics
          python3 - <<'PY'
          import json
          from pathlib import Path

          folder = Path("lab_pics")
          exts = {".jpg", ".jpeg", ".png", ".webp", ".gif"}

          files = sorted(
              p.name for p in folder.iterdir()
              if p.is_file()
              and p.suffix.lower() in exts
              and p.name != "gallery.json"
          )

          (folder / "gallery.json").write_text(
              json.dumps(files, indent=2) + "\n",
              encoding="utf-8"
          )
          PY

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lab_pics/gallery.json
          git diff --cached --quiet || git commit -m "Update lab photo gallery manifest"
          git push
