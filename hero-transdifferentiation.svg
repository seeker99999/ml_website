<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 950" role="img" aria-label="Abstract illustration of transdifferentiation from endothelial vessel to neuron">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#091421"/>
      <stop offset="50%" stop-color="#0b1828"/>
      <stop offset="100%" stop-color="#13263a"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="34%" cy="46%" r="46%">
      <stop offset="0%" stop-color="#ff9152" stop-opacity="0.7"/>
      <stop offset="42%" stop-color="#f26f21" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#f26f21" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="74%" cy="40%" r="44%">
      <stop offset="0%" stop-color="#8adcec" stop-opacity="0.85"/>
      <stop offset="42%" stop-color="#63bfd8" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#63bfd8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vesselFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d24f0f"/>
      <stop offset="55%" stop-color="#f26f21"/>
      <stop offset="100%" stop-color="#ffb071"/>
    </linearGradient>
    <linearGradient id="vesselCore" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd7b8"/>
      <stop offset="100%" stop-color="#fff0df"/>
    </linearGradient>
    <linearGradient id="transitionStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff9d62"/>
      <stop offset="50%" stop-color="#fff0c6"/>
      <stop offset="100%" stop-color="#73d6ea"/>
    </linearGradient>
    <linearGradient id="neuronStroke" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7be5f0"/>
      <stop offset="70%" stop-color="#9bf0f8"/>
      <stop offset="100%" stop-color="#eefeff"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="950" fill="url(#bg)"/>
  <rect width="1600" height="950" fill="url(#glowLeft)"/>
  <rect width="1600" height="950" fill="url(#glowRight)"/>

